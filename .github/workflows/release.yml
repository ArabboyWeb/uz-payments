name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package dry run
        run: |
          pnpm --filter @uz-payments/core exec npm pack --dry-run
          pnpm --filter @uz-payments/payme exec npm pack --dry-run
          pnpm --filter @uz-payments/express exec npm pack --dry-run
          pnpm --filter @uz-payments/next exec npm pack --dry-run

      - name: Publish packages
        run: |
          pnpm --filter @uz-payments/core publish --access public --no-git-checks
          pnpm --filter @uz-payments/payme publish --access public --no-git-checks
          pnpm --filter @uz-payments/express publish --access public --no-git-checks
          pnpm --filter @uz-payments/next publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
