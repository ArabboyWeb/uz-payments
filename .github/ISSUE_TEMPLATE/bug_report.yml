name: Bug report
description: Report a bug in an implemented uz-payments package.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include provider secrets, authorization headers, raw card data, or customer personal data.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@uz-payments/payme"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps, sanitized payloads, or a small code sample.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      placeholder: "pnpm test, pnpm typecheck"
